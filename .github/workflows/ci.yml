name: CI

on:
  workflow_call:
    inputs:
      test-command:
        description: 'The command to run tests'
        required: false
        type: string
        default: 'bundle exec rspec'
      linter-command:
        description: 'The command to run the linter'
        required: false
        type: string
        default: 'bundle exec rubocop'
jobs:
  run_tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby:
          - 3.2
          - 3.3
          - 3.4
          - 4.0
    env:
      BUNDLE_GEMFILE: Gemfile
    name: "Run tests: Ruby ${{ matrix.ruby }}"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: ${{ matrix.ruby }}
      - name: Run tests
        # zizmor: ignore[template-injection] workflow_call inputs are controlled by the caller
        run: ${{ inputs.test-command }}
  static_type_check:
    name: "Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: 3.4
      - name: Run static type checks
        run: bundle exec srb tc
  run_linter:
    runs-on: ubuntu-latest
    name: "Linter"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: 3.4
      - name: Run linter
        # zizmor: ignore[template-injection] workflow_call inputs are controlled by the caller
        run: ${{ inputs.linter-command }}
  notify_on_failure:
    runs-on: ubuntu-latest
    needs: [run_tests, static_type_check, run_linter]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    steps:
      - uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "${{ github.repository }}/${{ github.ref }}: FAILED\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
